<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚魚的委託管理系統</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #f7fafc;
            padding: 16px;
            color: #1a1a1a;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #666;
            font-weight: 700;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn-main {
            flex: 1;
            padding: 14px 10px;
            font-size: 15px;
            font-weight: 900;
            background-color: #ffde4d;
            border: 3px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #1a1a1a;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn-main:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1a1a1a;
        }

        .btn-group-manage {
            background-color: #a2c2e8;
        }

        .search-bar-container {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            border: 3px solid #1a1a1a;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 3px 3px 0px #1a1a1a;
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 16px;
            overflow-y: auto;
        }

        .modal-content {
            background-color: #ffffff;
            border: 3px solid #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 6px 6px 0px #1a1a1a;
            max-width: 500px;
            margin: 40px auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            border: 2px solid #1a1a1a;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 6px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 16px;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            background-color: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #bbf7d0;
            border: 3px solid #1a1a1a;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 900;
            box-shadow: 3px 3px 0px #1a1a1a;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-tab {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 800;
            background-color: #fff;
            border: 2px solid #1a1a1a;
            border-radius: 6px;
            box-shadow: 2px 2px 0px #1a1a1a;
            cursor: pointer;
        }

        .btn-tab.active { background-color: #e2e8f0; }

        .member-card {
            background-color: #d4e6f7;
            border: 3px solid #1a1a1a;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 5px 5px 0px #1a1a1a;
        }

        .card-header { border-bottom: 2px dashed #1a1a1a; padding-bottom: 8px; margin-bottom: 10px; font-size: 18px; font-weight: 900; }

        .stock-item {
            background-color: #ffffff;
            border: 2px solid #1a1a1a;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-select {
            padding: 6px 4px;
            font-size: 12px;
            font-weight: 800;
            border: 2px solid #1a1a1a;
            border-radius: 4px;
        }
        
        .empty-state { text-align: center; padding: 40px; font-weight: 800; border: 2px dashed #1a1a1a; }
    </style>
</head>
<body>

    <header>
        <h1>📋 魚魚的委託管理中心</h1>
    </header>

    <div class="action-bar">
        <button class="btn-main" onclick="openModal('importModal')">✨ 批量匯入 Excel 資料</button>
        <button class="btn-main btn-group-manage" onclick="openModal('groupModal')">👨‍👩‍👧‍👦 綁定家族群組</button>
    </div>

    <div class="search-bar-container">
        <input type="text" id="searchKeyword" class="search-input" placeholder="🔍 搜尋..." oninput="renderCards()">
    </div>

    <main id="cardList">
        <div class="empty-state">目前還沒有資料唷！</div>
    </main>

    <div class="modal" id="importModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('importModal')">&times;</span>
            <div class="modal-title">📝 批量追加委託資料</div>
            <form onsubmit="submitExcelForm(event)">
                <textarea id="excelRaw" class="form-control" rows="10" placeholder="貼上 Excel 資料..." required></textarea>
                <button type="submit" class="btn-submit">🚀 辨識並匯入</button>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'fish_data_storage';
        let rawStocks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

        function submitExcelForm(e) {
            e.preventDefault();
            const text = document.getElementById('excelRaw').value;
            const lines = text.split('\n');
            
            lines.forEach(line => {
                let tokens = line.trim().split(/\t+| {2,}|\,/).map(t => t.trim()).filter(t => t.length > 0);
                if (tokens.length >= 2 && /^\d{4}$/.test(tokens[0])) {
                    rawStocks.push({
                        id: tokens[0],
                        name: tokens[1] || '未知',
                        gift: tokens[2] || '無',
                        userName: tokens[3] || '未填',
                        date: tokens[4] || new Date().toLocaleString(),
                        status: 'success' // <--- 匯入即成功
                    });
                }
            });
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(rawStocks));
            closeModal('importModal');
            document.getElementById('excelRaw').value = '';
            renderCards();
        }

        function renderCards() {
            const list = document.getElementById('cardList');
            list.innerHTML = rawStocks.length === 0 ? '<div class="empty-state">目前還沒有資料唷！</div>' : '';
            
            rawStocks.forEach((item, idx) => {
                list.innerHTML += `
                    <div class="member-card" style="margin-bottom:15px;">
                        <div class="card-header">👤 ${item.userName}</div>
                        <div class="stock-item">
                            <div><strong>${item.id} ${item.name}</strong><br><small>🎁 ${item.gift} | 📅 ${item.date}</small></div>
                            <select class="status-select" onchange="updateStatus(${idx}, this.value)">
                                <option value="success" ${item.status=='success'?'selected':''}>✅ 成功</option>
                                <option value="fail" ${item.status=='fail'?'selected':''}>❌ 失敗</option>
                                <option value="fee" ${item.status=='fee'?'selected':''}>⚠️ 加費</option>
                            </select>
                        </div>
                    </div>`;
            });
        }

        function updateStatus(idx, val) {
            rawStocks[idx].status = val;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(rawStocks));
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        renderCards();
    </script>
</body>
</html>
