<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>委託管理</title>
    <style>
        .card { border: 1px solid #ccc; padding: 10px; margin: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="app">讀取中...</div>
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx9mo8aRflpbIH0tuNhzijZpdLp4paZKOUWUCFWXbBhv_svtdaXPmOk7PN8ER8_opZa/exec"; 
        
        async function init() {
            // 直接用 GET 讀取，配合 GAS 的 doGet 輸出純文字
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            render(data);
        }

        function render(data) {
            const groups = {};
            data.slice(1).forEach(r => {
                const g = r[7] || "未分組"; // H欄是家族
                if(!groups[g]) groups[g] = [];
                groups[g].push({id:r[0], name:r[1], time:r[4], status:r[5]});
            });

            document.getElementById('app').innerHTML = Object.keys(groups).map(g => `
                <div class="card">
                    <h3>${g}</h3>
                    ${groups[g].map(i => `
                        <div>
                            ${i.id} ${i.name} 
                            <input onchange="setGroup('${i.id}', '${i.time}', this.value)" placeholder="輸入家族">
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        async function setGroup(id, time, groupName) {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'setGroup', id, time, groupName })
            });
            alert('已更新');
            location.reload();
        }
        init();
    </script>
</body>
</html>
