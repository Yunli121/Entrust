<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>魚魚的委託管理系統 (家族版)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #f7fafc; padding: 16px; color: #1a1a1a; max-width: 600px; margin: 0 auto; }
        .member-card { background-color: #d4e6f7; border: 3px solid #1a1a1a; border-radius: 14px; padding: 16px; margin-bottom: 15px; box-shadow: 5px 5px 0px #1a1a1a; }
        .stock-item { background: #fff; padding: 10px; border: 2px solid #000; margin-top: 8px; }
        .btn-main { padding: 12px; font-weight: 900; background-color: #ffde4d; border: 3px solid #1a1a1a; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📋 魚魚的委託管理中心</h1>
    <div style="margin-bottom:16px;">
        <button class="btn-main" onclick="location.reload()">🔄 同步雲端</button>
    </div>
    <div id="stats" style="font-weight:bold;"></div>
    <main id="list"></main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx9mo8aRflpbIH0tuNhzijZpdLp4paZKOUWUCFWXbBhv_svtdaXPmOk7PN8ER8_opZa/exec";
        let rawData = [];

        async function init() {
            const res = await fetch(WEB_APP_URL);
            rawData = await res.json();
            displayData();
        }

        function displayData() {
            const dataRows = rawData.slice(1);
            document.getElementById('stats').innerText = `總計：${dataRows.length} 筆`;
            
            const groups = {};
            dataRows.forEach((r) => {
                // 如果 G 欄 (r[6]) 有資料就用家族名稱，沒有就用個人名 (r[3])
                const groupName = r[6] || r[3]; 
                if(!groups[groupName]) groups[groupName] = [];
                groups[groupName].push({ id:r[0], name:r[1], user:r[3], time:r[4], status:r[5] });
            });

            document.getElementById('list').innerHTML = Object.keys(groups).map(g => `
                <div class="member-card">
                    <div style="font-weight:900; border-bottom:2px dashed #000;">🏠 家族：${g}</div>
                    ${groups[g].map(item => `
                        <div class="stock-item">
                            <div><strong>${item.id} ${item.name}</strong> (👤 ${item.user})</div>
                            <input type="text" placeholder="設定家族名稱" onchange="setGroup('${item.id}', '${item.time}', this.value)" style="width:100px; margin-top:5px;">
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // 修改 Apps Script 後端函數，讓這裡能把家族名稱寫入 G 欄
        async function setGroup(id, time, groupName) {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ type:'setGroup', id, time, groupName }) });
            alert('已設定至：' + groupName);
        }
        
        init();
    </script>
</body>
</html>
