<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>魚魚的委託管理系統</title>
    <style>
        /* 這裡放你原本完整的 CSS */
        body { background-color: #f7fafc; padding: 16px; font-family: sans-serif; }
        .member-card { background-color: #d4e6f7; border: 3px solid #1a1a1a; padding: 16px; margin-bottom: 15px; }
        .btn-main { padding: 14px; background: #ffde4d; border: 3px solid #1a1a1a; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding: 20px; }
        .modal-content { background: #fff; padding: 20px; border: 3px solid #1a1a1a; max-width: 500px; margin: 40px auto; }
    </style>
</head>
<body>
    <button class="btn-main" onclick="document.getElementById('m').style.display='block'">✨ 批量匯入</button>
    <main id="list"></main>

    <div id="m" class="modal">
        <div class="modal-content">
            <textarea id="t" style="width:100%; height:100px;"></textarea>
            <button onclick="imp()">匯入</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('f_data') || '[]');

        function imp() {
            const text = document.getElementById('t').value;
            const lines = text.split('\n');
            lines.forEach(line => {
                let c = line.split(/\t|,| {2,}/);
                if (c.length >= 2) {
                    data.push({ 
                        id: c[0], name: c[1], gift: c[2]||'', 
                        user: c[3]||'無', time: new Date().toLocaleString(),
                        status: 'success' // <--- 確保匯入狀態為成功
                    });
                }
            });
            localStorage.setItem('f_data', JSON.stringify(data));
            document.getElementById('m').style.display = 'none';
            render();
        }

        function render() {
            document.getElementById('list').innerHTML = data.map((item, i) => `
                <div class="member-card">
                    <div>${item.id} ${item.name}</div>
                    <select onchange="up(${i}, this.value)">
                        <option value="success" ${item.status=='success'?'selected':''}>✅ 成功</option>
                        <option value="fail" ${item.status=='fail'?'selected':''}>❌ 失敗</option>
                        <option value="fee" ${item.status=='fee'?'selected':''}>⚠️ 加費</option>
                    </select>
                </div>
            `).join('');
        }

        function up(i, v) { data[i].status = v; localStorage.setItem('f_data', JSON.stringify(data)); }
        render();
    </script>
</body>
</html>
