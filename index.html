<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚魚的委託管理系統</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f7fafc; padding: 16px; color: #1a1a1a; max-width: 600px; margin: 0 auto; }
        .action-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .btn-main { flex: 1; padding: 14px; font-size: 15px; font-weight: 900; background-color: #ffde4d; border: 3px solid #1a1a1a; border-radius: 12px; box-shadow: 4px 4px 0px #1a1a1a; cursor: pointer; color: #000 !important; }
        .btn-group-manage { background-color: #a2c2e8; }
        .btn-clear { background: #fecaca; border: 2px solid #1a1a1a; padding: 4px 8px; font-weight: 800; cursor: pointer; }
        .search-input { width: 100%; padding: 12px; border: 3px solid #1a1a1a; border-radius: 10px; margin-bottom: 16px; font-weight: 700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; padding: 16px; }
        .modal-content { background: #fff; border: 3px solid #1a1a1a; border-radius: 16px; padding: 20px; max-width: 500px; margin: 40px auto; }
        .member-card { background-color: #d4e6f7; border: 3px solid #1a1a1a; border-radius: 14px; padding: 16px; margin-bottom: 15px; box-shadow: 5px 5px 0px #1a1a1a; }
        .card-header { font-size: 18px; font-weight: 900; border-bottom: 2px dashed #1a1a1a; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .stock-item { background-color: #ffffff; border: 2px solid #1a1a1a; border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .status-select { padding: 6px; font-weight: 900; border: 2px solid #1a1a1a; border-radius: 4px; color: #000; cursor: pointer; }
    </style>
</head>
<body>

    <h1>📋 魚魚的委託管理中心</h1>
    <div class="action-bar">
        <button class="btn-main" onclick="document.getElementById('m').style.display='block'">✨ 批量匯入</button>
        <button class="btn-main btn-group-manage" onclick="document.getElementById('gm').style.display='block'">👨‍👩‍👧‍👦 綁定家族</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div id="stats" style="font-weight:bold;"></div>
        <button class="btn-clear" onclick="clearData()">🗑️ 清空資料</button>
    </div>

    <input type="text" id="search" class="search-input" placeholder="🔍 搜尋..." oninput="render()">
    <main id="list"></main>

    <div id="m" class="modal">
        <div class="modal-content">
            <h3>📝 批量匯入</h3>
            <textarea id="t" style="width:100%; height:150px; margin:10px 0; border:2px solid #1a1a1a; padding:10px;"></textarea>
            <button class="btn-main" style="width:100%; background:#bbf7d0;" onclick="imp()">🚀 確定匯入</button>
        </div>
    </div>

    <div id="gm" class="modal">
        <div class="modal-content">
            <h3>👨‍👩‍👧‍👦 綁定家族群組</h3>
            <p style="margin:10px 0; font-size: 14px;">(輸入人名，若在群組內會自動分組)</p>
            <textarea id="gt" style="width:100%; height:100px; border:2px solid #1a1a1a;"></textarea>
            <button class="btn-main" style="width:100%;" onclick="saveGroup()">💾 儲存綁定</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('f_data') || '[]');
        let groups = JSON.parse(localStorage.getItem('f_groups') || '{}');

        function imp() {
            const text = document.getElementById('t').value;
            text.split('\n').forEach(line => {
                let c = line.trim().split(/\t+| {2,}|\,/);
                if (c.length >= 2 && /^\d{4}$/.test(c[0].trim())) {
                    data.push({ id: c[0].trim(), name: c[1].trim(), gift: c[2]||'無', user: c[3]||'無', time: new Date().toLocaleString(), status: 'success' });
                }
            });
            localStorage.setItem('f_data', JSON.stringify(data));
            document.getElementById('m').style.display = 'none';
            render();
        }

        function saveGroup() {
            const text = document.getElementById('gt').value;
            localStorage.setItem('f_groups', JSON.stringify({ names: text.split('\n') }));
            document.getElementById('gm').style.display = 'none';
            render();
        }

        function clearData() { if(confirm('確定清空？')) { data = []; localStorage.removeItem('f_data'); render(); } }

        function render() {
            const kw = document.getElementById('search').value.toLowerCase();
            const filtered = data.filter(i => (i.id+i.name+i.user+i.gift).toLowerCase().includes(kw));
            document.getElementById('stats').innerText = `總計：${filtered.length} 筆`;
            
            const groupsMap = filtered.reduce((acc, curr) => {
                (acc[curr.user] = acc[curr.user] || []).push(curr);
                return acc;
            }, {});

            document.getElementById('list').innerHTML = Object.keys(groupsMap).map(user => `
                <div class="member-card">
                    <div class="card-header">👤 ${user} <span>(${groupsMap[user].length}筆)</span></div>
                    ${groupsMap[user].map((item, idx) => `
                        <div class="stock-item">
                            <div><strong>${item.id} ${item.name}</strong><br><small>🎁 ${item.gift} | 📅 ${item.time}</small></div>
                            <select class="status-select" onchange="up('${item.id}-${item.time}', this.value)">
                                <option value="success" ${item.status=='success'?'selected':''}>✅ 成功</option>
                                <option value="fail" ${item.status=='fail'?'selected':''}>❌ 失敗</option>
                                <option value="fee" ${item.status=='fee'?'selected':''}>⚠️ 加費</option>
                            </select>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function up(idTime, val) {
            data.find(i => (i.id+'-'+i.time) === idTime).status = val;
            localStorage.setItem('f_data', JSON.stringify(data));
        }
        render();
    </script>
</body>
</html>
