<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>йӯҡйӯҡзҡ„е§”иЁ—з®ЎзҗҶзі»зөұ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #f7fafc; padding: 16px; color: #1a1a1a; max-width: 600px; margin: 0 auto; }
        
        .action-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .btn-main {
            flex: 1; padding: 14px; font-size: 15px; font-weight: 900;
            background-color: #ffde4d; border: 3px solid #1a1a1a;
            border-radius: 12px; box-shadow: 4px 4px 0px #1a1a1a;
            cursor: pointer; color: #000000 !important; /* еј·еҲ¶ж·ұиүІ */
        }
        .btn-group-manage { background-color: #a2c2e8; color: #000000 !important; }
        
        .search-input { width: 100%; padding: 12px; border: 3px solid #1a1a1a; border-radius: 10px; margin-bottom: 16px; font-weight: 800; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; padding: 16px; }
        .modal-content { background: #fff; border: 3px solid #1a1a1a; border-radius: 16px; padding: 20px; max-width: 500px; margin: 40px auto; }
        
        .member-card { background-color: #d4e6f7; border: 3px solid #1a1a1a; border-radius: 14px; padding: 16px; margin-bottom: 15px; box-shadow: 5px 5px 0px #1a1a1a; }
        .card-header { font-size: 18px; font-weight: 900; border-bottom: 2px dashed #1a1a1a; padding-bottom: 8px; margin-bottom: 10px; }
        .stock-item { background-color: #ffffff; border: 2px solid #1a1a1a; border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-select { padding: 6px; font-weight: 900; border: 2px solid #1a1a1a; border-radius: 4px; color: #000000; }
    </style>
</head>
<body>

    <h1>рҹ“Ӣ йӣ¶иӮЎе§”иЁ—з®ЎзҗҶдёӯеҝғ рҹ“Ӣ</h1>
    <div class="action-bar">
        <button class="btn-main" onclick="document.getElementById('importModal').style.display='block'">вңЁ жү№йҮҸеҢҜе…Ҙ</button>
        <button class="btn-main btn-group-manage" onclick="document.getElementById('groupModal').style.display='block'">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ з¶Ғе®ҡе®¶ж—Ҹ</button>
    </div>

    <input type="text" id="search" class="search-input" placeholder="рҹ”Қ жҗңе°Ӣ..." oninput="renderCards()">
    <main id="cardList"></main>

    <div id="importModal" class="modal">
        <div class="modal-content">
            <h3>рҹ“қ жү№йҮҸеҢҜе…Ҙ</h3>
            <textarea id="excelRaw" style="width:100%; height:150px; margin:10px 0; border:2px solid #1a1a1a;"></textarea>
            <button class="btn-main" style="width:100%; background:#bbf7d0;" onclick="submitExcel()">рҹҡҖ зўәе®ҡеҢҜе…Ҙ</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'fish_data_storage';
        
        // гҖҗйҳІз•¶ж©ҹијүе…ҘгҖ‘еҰӮжһңиіҮж–ҷи®ҖеҸ–еӨұж•—пјҢзӣҙжҺҘйҮҚзҪ®зӮәз©әйҷЈеҲ—
        let rawStocks = [];
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) rawStocks = JSON.parse(saved);
        } catch (e) {
            console.error("иіҮж–ҷз•°еёёпјҢе·ІйҮҚзҪ®");
            localStorage.removeItem(STORAGE_KEY);
        }

        function submitExcel() {
            const text = document.getElementById('excelRaw').value;
            if(!text.trim()) return;
            
            const lines = text.split('\n');
            lines.forEach(line => {
                let cols = line.trim().split(/\t+| {2,}|\,/).map(t => t.trim());
                if (cols.length >= 2 && /^\d{4}$/.test(cols[0])) {
                    rawStocks.push({
                        id: cols[0], name: cols[1], gift: cols[2] || '',
                        userName: cols[3] || 'з„Ў', date: cols[4] || new Date().toLocaleString(),
                        status: 'success'
                    });
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(rawStocks));
            document.getElementById('importModal').style.display = 'none';
            document.getElementById('excelRaw').value = '';
            renderCards();
        }

        function renderCards() {
            const keyword = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('cardList');
            list.innerHTML = '';
            
            rawStocks.filter(i => (i.id+i.name+i.userName).toLowerCase().includes(keyword))
            .forEach((item, idx) => {
                list.innerHTML += `
                    <div class="member-card">
                        <div class="card-header">рҹ‘Ө ${item.userName}</div>
                        <div class="stock-item">
                            <div><strong>${item.id} ${item.name}</strong><br><small>рҹҺҒ ${item.gift} | рҹ“… ${item.date}</small></div>
                            <select class="status-select" onchange="updateStatus(${idx}, this.value)">
                                <option value="success" ${item.status=='success'?'selected':''}>вң… е§”иЁ—жҲҗеҠҹ</option>
                                <option value="fail" ${item.status=='fail'?'selected':''}>вқҢ е§”иЁ—еӨұж•—</option>
                                <option value="fee" ${item.status=='fee'?'selected':''}>вҡ пёҸ еҠ иІ»5е…ғ</option>
                            </select>
                        </div>
                    </div>`;
            });
        }

        function updateStatus(idx, val) {
            rawStocks[idx].status = val;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(rawStocks));
        }

        renderCards();
    </script>
</body>
</html>
